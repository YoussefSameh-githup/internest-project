{% extends 'internship/base.html' %}
{% load static %}

{% block title %}تم تسجيل الخروج — Internest{% endblock %}

{% block content %}
<section class="section">
    <div class="container-narrow">
        <div class="card text-center" style="padding: var(--space-12);">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--brand-100); display: inline-flex; align-items: center; justify-content: center; margin-bottom: var(--space-5);">
                <i class="bi bi-hand-thumbs-up-fill" style="font-size: 36px; color: var(--brand-700);"></i>
            </div>
            <h1>إلى اللقاء 👋</h1>
            <p class="text-muted" style="font-size: var(--text-lg); max-width: 460px; margin-inline: auto;">
                تم تسجيل خروجك بأمان. نتمنى أن نراك قريباً مع فرص جديدة.
            </p>
            <div class="btn-group mt-6" style="justify-content: center;">
                <a href="{% url 'login' %}" class="btn btn--primary btn--lg">
                    <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول مجدداً
                </a>
                <a href="{% url 'landing' %}" class="btn btn--ghost btn--lg">العودة للرئيسية</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
