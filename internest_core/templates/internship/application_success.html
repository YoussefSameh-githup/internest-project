{% extends 'internship/base.html' %}
{% load static %}

{% block title %}تم التقديم بنجاح — Internest{% endblock %}

{% block content %}
<section class="section">
    <div class="container-narrow">
        <div class="card text-center fade-up" style="padding: var(--space-12);">
            <div style="width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, #dcfce7, #bbf7d0); display: inline-flex; align-items: center; justify-content: center; margin-bottom: var(--space-6);">
                <i class="bi bi-check-lg" style="font-size: 48px; color: var(--color-success);"></i>
            </div>

            <h1 style="color: var(--color-success);">تم التقديم بنجاح 🎉</h1>
            <p class="text-muted" style="font-size: var(--text-lg); max-width: 480px; margin-inline: auto;">
                وصل طلبك للمراجعة. هيتم تحويلك للشركة لو ملفك تأهل، وهتوصلك إشعارات بأي تحديث.
            </p>

            <div class="btn-group mt-6" style="justify-content: center;">
                <a href="{% url 'my_applications' %}" class="btn btn--primary btn--lg">
                    <i class="bi bi-file-earmark-text"></i> متابعة طلباتي
                </a>
                <a href="{% url 'list' %}" class="btn btn--outline btn--lg">
                    تصفّح فرص أخرى
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
